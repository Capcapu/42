
events {}												# la section events est une section de configuration de nginx qui est utilisee pour configurer les parametres liés aux événements, comme le nombre de connexions simultanées que nginx peut gérer, le nombre de processus de travail, etc.

http {													# http est la section principale de la configuration de nginx, c est la ou on configure les serveurs virtuels, les emplacements, les types de fichiers, etc
    include /etc/nginx/mime.types;						# on inclut le fichier mime.types qui contient les types de fichiers que nginx peut servir, comme text/html pour les fichiers html, image/png pour les fichiers png, etc	
    default_type application/octet-stream;				# le type de fichier par defaut que nginx va utiliser pour les fichiers qui n ont pas de type specifie dans le fichier mime.types, ici on indique que le type de fichier par defaut est application/octet-stream, ce qui signifie que nginx va traiter ces fichiers comme des fichiers binaires generiques

    server {
        listen 443 ssl; 								# ecoute en IPv4
        listen [::]:443 ssl;							# ecoute en IPv6

        server_name $DOMAIN_NAME;						# le nom de domaine que nginx doit servir, ici on utilise la variable d'environnement DOMAIN_NAME qui est definie dans le docker-compose.yml

        ssl_protocols TLSv1.2 TLSv1.3;					# les protocoles de securite que nginx doit utiliser pour le ssl
        ssl_certificate /etc/nginx/ssl/nginx.crt;		# le chemin vers le certificat ssl que nous avons genere dans le Dockerfile
        ssl_certificate_key /etc/nginx/ssl/nginx.key; 	# le chemin vers la cle privee du certificat ssl

        root /var/www/html; 							# le dossier racine de notre serveur nginx, c est la ou nginx va chercher les fichiers a servir pour les requetes entrantes

        index index.php index.html index.htm; 			# les fichiers que nginx va essayer de servir par defaut lorsqu une requete arrive sans specifie de fichier, ici on indique que nginx doit d abord essayer de servir index.php, puis index.html, puis index.htm

        #location / est la configuration pour la route racine de notre serveur, c est a dire la page d accueil de notre site web
        #try_files est une directive qui indique a nginx de tester l existence des fichiers dans l ordre indique, ici on dit a nginx de tester si le fichier correspondant a l uri existe, puis si un dossier correspondant a l uri existe, et si aucun des deux n existe alors de retourner une erreur 404
        location / {
            try_files $uri $uri/ =404;
        }

        # le sujet indique que php doit etre installe sur le container wordpress et non nginx
        # ici on specifie juste a nginx comment gerer php
        location ~ \.php$ {								# Pour toutes les requetes php
            include snippets/fastcgi-php.conf;			# on inclut la configuration de fastcgi pour php, qui se trouve dans le dossier snippets de nginx, ce fichier contient les directives necessaires pour que nginx puisse communiquer avec le processus php-fpm qui tourne sur le container wordpress
            fastcgi_pass wordpress:9000;				# on dit a nginx de passer les requetes php au processus php-fpm qui tourne sur le container wordpress, en utilisant le nom de service "wordpress" qui est defini dans le docker-compose.yml et le port 9000 qui est le port par defaut pour php-fpm
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; # on indique a nginx de definir la variable d environnement SCRIPT_FILENAME pour php, qui contient le chemin complet vers le fichier php a executer, en concatenant le document root (le dossier racine) et le nom du script php qui est demande dans la requete
            include fastcgi_params;						# on inclut les autres parametres de fast
        }

        # pour toutes les requetes qui commencent par .ht, comme .htaccess ou .htpasswd, on veut interdire l acces a ces fichiers pour des raisons de securite	
        # bloquer cet acces evite d'exposer des donnees sensibles
        location ~ /\.ht {
            deny all;
        }			
    }
}

###########################################################################

# Pv4 et IPv6 sont deux versions du “langage d’adressage” IP sur Internet. 
# il n'y avait plus assez d'adresses IPv4 pour tous les appareils connectés, alors IPv6 a été créé pour fournir un nombre beaucoup plus grand d'adresses IP uniques.
# IPv4 utilise des adresses de 32 bits, ce qui permet environ 4,3 milliards d'adresses uniques, tandis que IPv6 utilise des adresses de 128 bits, ce qui permet un nombre astronomique d'adresses uniques (environ 3,4 x 10^38).